<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelou Accounting System</title>

<style>

:root{
--blue:#0a84ff;
--green:#30d158;
--orange:#ff9f0a;
--red:#ff453a;
--bg:#f5f7fb;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:280px;
background:#fff;
padding:25px;
border-right:1px solid var(--line);
}

.logo h2{
color:var(--blue);
margin-bottom:5px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
margin-top:25px;
}

.menu button{
padding:15px;
border:none;
border-radius:14px;
background:#f3f4f6;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.menu button:hover{
background:var(--blue);
color:white;
}

.main{
flex:1;
padding:25px;
padding-top:90px;
}

.topbar{
position:fixed;
top:0;
left:280px;
right:0;
height:70px;
background:white;
border-bottom:1px solid var(--line);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
z-index:999;
}

.logout-btn{
padding:12px 18px;
border:none;
border-radius:12px;
background:var(--red);
color:white;
font-weight:bold;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
margin-bottom:10px;
color:gray;
}

.value{
font-size:30px;
font-weight:bold;
}

.blue{color:var(--blue);}
.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}

.table-box{
background:white;
padding:25px;
border-radius:24px;
margin-bottom:25px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
width:100%;
max-width:1000px;
background:white;
padding:30px;
border-radius:28px;
max-height:90vh;
overflow:auto;
}

.popup-box input,
.popup-box textarea,
.popup-box select{
width:100%;
padding:15px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.primary-btn,
.secondary-btn,
.success-btn,
.danger-btn{
padding:12px 16px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.primary-btn{
background:var(--blue);
color:white;
}

.secondary-btn{
background:#ddd;
}

.success-btn{
background:var(--green);
color:white;
}

.danger-btn{
background:var(--red);
color:white;
}

.status-paid{
background:rgba(48,209,88,.15);
color:var(--green);
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.status-pending{
background:rgba(255,159,10,.15);
color:var(--orange);
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.receipt-preview{
background:#fafafa;
padding:25px;
border-radius:18px;
border:1px solid #ddd;
margin-top:20px;
}

.login-wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:420px;
background:white;
padding:40px;
border-radius:35px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.login-input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:16px;
background:#f3f4f6;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:var(--blue);
color:white;
font-weight:bold;
cursor:pointer;
}

@media(max-width:768px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

.topbar{
left:0;
}

.main{
padding-top:110px;
}

}

</style>
</head>

<body>

<div id="app"></div>

<script>

function loadData(key){
return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
localStorage.setItem(key,JSON.stringify(data));
}

function sanitize(str){
return String(str)
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

const users=[
{
username:"jackie@quelou.com.ph",
password:btoa("@dm1nEvo"),
role:"Super Admin"
}
];

if(!localStorage.getItem("systemUsers")){
saveData("systemUsers",users);
}

let invoices=loadData("invoices");
let ledger=loadData("ledger");

function renderLogin(){

document.getElementById("app").innerHTML=`

<div class="login-wrapper">

<div class="login-card">

<h1 style="color:#0a84ff;">Quelou ERP</h1>

<p style="margin:15px 0 25px;">
AI Accounting System
</p>

<input type="text" id="username" class="login-input" placeholder="Username">

<input type="password" id="password" class="login-input" placeholder="Password">

<button class="login-btn" onclick="login()">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=loadData("systemUsers");

let user=users.find(u=>
u.username===username &&
u.password===btoa(password)
);

if(!user){
alert("Invalid Login");
return;
}

sessionStorage.setItem("user",JSON.stringify(user));

location.reload();

}

function logout(){
sessionStorage.removeItem("user");
location.reload();
}

if(!sessionStorage.getItem("user")){
renderLogin();
}else{
renderApp();
}

function renderApp(){

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<div class="logo">
<h2>Quelou ERP</h2>
<p>Billing • Collection • Accounting</p>
</div>

<div class="menu">

<button onclick="openPopup()">
➕ Create Invoice
</button>

<button onclick="exportJSON()">
💾 Export JSON
</button>

<button onclick="downloadBackup()">
⬇️ Download Backup
</button>

<button onclick="window.print()">
🖨️ Print Reports
</button>

</div>

</div>

<div class="main">

<h1>Accounting Dashboard</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value blue" id="sales">₱0</div>
</div>

<div class="card">
<h3>Total Invoices</h3>
<div class="value green" id="invoiceCount">0</div>
</div>

<div class="card">
<h3>Pending Collection</h3>
<div class="value orange" id="pendingCount">0</div>
</div>

<div class="card">
<h3>Collected Payments</h3>
<div class="value red" id="paidCount">0</div>
</div>

</div>

<div class="table-box">

<h2>Billing to Collection Monitoring</h2>

<br>

<table id="table"></table>

</div>

<div class="table-box">

<h2>General Ledger</h2>

<br>

<table id="ledgerTable"></table>

</div>

</div>

</div>

<div class="topbar">

<h3>Quelou ERP AI Accounting PRO</h3>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h2>Create Billing / Invoice</h2>

<br>

<input type="text" id="customer" placeholder="Customer Name">

<input type="text" id="tin" placeholder="TIN Number">

<input type="text" id="address" placeholder="Customer Address">

<input type="number" id="amount" placeholder="Sales Amount">

<input type="number" id="vat" value="12" placeholder="VAT %">

<select id="status">
<option value="Pending">Pending Collection</option>
<option value="Paid">Paid</option>
</select>

<select id="documentType">
<option value="EIS">EIS</option>
<option value="EOPT">EOPT</option>
<option value="EOR">EOR</option>
<option value="BIR CAS">BIR CAS</option>
</select>

<textarea id="remarks" placeholder="Remarks"></textarea>

<button class="primary-btn" onclick="saveInvoice()">
Save Transaction
</button>

<button class="success-btn" onclick="previewReceipt()">
Preview Receipt
</button>

<button class="secondary-btn" onclick="closePopup()">
Close
</button>

<div id="previewArea"></div>

</div>

</div>

`;

renderInvoices();
renderLedger();
updateDashboard();

}

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function saveInvoice(){

let customer=document.getElementById("customer").value;
let tin=document.getElementById("tin").value;
let address=document.getElementById("address").value;
let amount=Number(document.getElementById("amount").value);
let vat=Number(document.getElementById("vat").value);
let status=document.getElementById("status").value;
let remarks=document.getElementById("remarks").value;
let documentType=document.getElementById("documentType").value;

if(!customer || amount<=0){
alert("Please complete required fields.");
return;
}

let vatAmount=(amount*vat)/100;
let total=amount+vatAmount;

let invoice={
invoice:"INV-"+Date.now(),
customer,
tin,
address,
amount,
vat,
vatAmount,
total,
status,
remarks,
documentType,
date:new Date().toLocaleString()
};

invoices.push(invoice);

ledger.push({
date:new Date().toLocaleString(),
reference:invoice.invoice,
debit: status==="Paid" ? "Cash" : "Accounts Receivable",
credit:"Sales Revenue",
amount:total,
remarks:customer
});

saveData("invoices",invoices);
saveData("ledger",ledger);

renderInvoices();
renderLedger();
updateDashboard();

closePopup();

alert("Transaction Saved Successfully");

}

function renderInvoices(){

let table=document.getElementById("table");

table.innerHTML=`

<tr>
<th>Invoice</th>
<th>Customer</th>
<th>Document</th>
<th>Amount</th>
<th>VAT</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
<th>Preview</th>
</tr>

`;

invoices.forEach(inv=>{

table.innerHTML+=`

<tr>

<td>${sanitize(inv.invoice)}</td>

<td>${sanitize(inv.customer)}</td>

<td>${sanitize(inv.documentType)}</td>

<td>₱${Number(inv.amount).toLocaleString()}</td>

<td>₱${Number(inv.vatAmount).toLocaleString()}</td>

<td><b>₱${Number(inv.total).toLocaleString()}</b></td>

<td>

<span class="${
inv.status==="Paid"
? "status-paid"
: "status-pending"
}">

${sanitize(inv.status)}

</span>

</td>

<td>

${
inv.status==="Paid"
? "Collected"
: `<button class="success-btn" onclick="collectPayment('${inv.invoice}')">Collect</button>`
}

</td>

<td>

<button class="primary-btn" onclick="showInvoice('${inv.invoice}')">
View
</button>

</td>

</tr>

`;

});

}

function collectPayment(invoiceNo){

let inv=invoices.find(i=>i.invoice===invoiceNo);

if(!inv) return;

inv.status="Paid";

ledger.push({
date:new Date().toLocaleString(),
reference:invoiceNo,
debit:"Cash",
credit:"Accounts Receivable",
amount:inv.total,
remarks:"Collection from "+inv.customer
});

saveData("invoices",invoices);
saveData("ledger",ledger);

renderInvoices();
renderLedger();
updateDashboard();

alert("Payment Collected");

}

function renderLedger(){

let table=document.getElementById("ledgerTable");

table.innerHTML=`

<tr>
<th>Date</th>
<th>Reference</th>
<th>Debit Account</th>
<th>Credit Account</th>
<th>Amount</th>
<th>Remarks</th>
</tr>

`;

ledger.forEach(item=>{

table.innerHTML+=`

<tr>

<td>${sanitize(item.date)}</td>

<td>${sanitize(item.reference)}</td>

<td>${sanitize(item.debit)}</td>

<td>${sanitize(item.credit)}</td>

<td>₱${Number(item.amount).toLocaleString()}</td>

<td>${sanitize(item.remarks)}</td>

</tr>

`;

});

}

function updateDashboard(){

let sales=invoices.reduce((a,b)=>a+b.total,0);

let paid=invoices.filter(i=>i.status==="Paid").length;

let pending=invoices.filter(i=>i.status!=="Paid").length;

document.getElementById("sales").innerHTML=
"₱"+sales.toLocaleString();

document.getElementById("invoiceCount").innerHTML=
invoices.length;

document.getElementById("pendingCount").innerHTML=
pending;

document.getElementById("paidCount").innerHTML=
paid;

}

function previewReceipt(){

let customer=document.getElementById("customer").value || "Sample Customer";

let amount=Number(document.getElementById("amount").value || 0);

let vat=Number(document.getElementById("vat").value || 12);

let documentType=document.getElementById("documentType").value;

let vatAmount=(amount*vat)/100;

let total=amount+vatAmount;

document.getElementById("previewArea").innerHTML=`

<div class="receipt-preview">

<h2>${documentType} RECEIPT PREVIEW</h2>

<hr><br>

<p><b>Business:</b> Quelou ERP AI Accounting</p>

<p><b>Customer:</b> ${sanitize(customer)}</p>

<p><b>Date:</b> ${new Date().toLocaleString()}</p>

<br>

<table style="width:100%;">

<tr>
<td>Sales Amount</td>
<td>₱${amount.toLocaleString()}</td>
</tr>

<tr>
<td>VAT</td>
<td>₱${vatAmount.toLocaleString()}</td>
</tr>

<tr>
<td><b>Total</b></td>
<td><b>₱${total.toLocaleString()}</b></td>
</tr>

</table>

<br>

<p><b>Document Type:</b> ${documentType}</p>

<p><b>BIR CAS READY FORMAT</b></p>

</div>

`;

}

function showInvoice(invoiceNo){

let inv=invoices.find(i=>i.invoice===invoiceNo);

if(!inv) return;

let win=window.open();

win.document.write(`

<html>

<head>

<title>${inv.invoice}</title>

<style>

body{
font-family:Arial;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:10px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<h1>${inv.documentType} DOCUMENT</h1>

<hr>

<p><b>Invoice No:</b> ${inv.invoice}</p>
<p><b>Date:</b> ${inv.date}</p>
<p><b>Customer:</b> ${inv.customer}</p>
<p><b>TIN:</b> ${inv.tin}</p>
<p><b>Address:</b> ${inv.address}</p>

<table>

<tr>
<td>Sales Amount</td>
<td>₱${inv.amount.toLocaleString()}</td>
</tr>

<tr>
<td>VAT ${inv.vat}%</td>
<td>₱${inv.vatAmount.toLocaleString()}</td>
</tr>

<tr>
<td><b>Total</b></td>
<td><b>₱${inv.total.toLocaleString()}</b></td>
</tr>

</table>

<br>

<h3>Accounting Entry</h3>

<p>
Debit:
${inv.status==="Paid" ? "Cash" : "Accounts Receivable"}
</p>

<p>
Credit: Sales Revenue
</p>

<p>
Amount: ₱${inv.total.toLocaleString()}
</p>

</body>

</html>

`);

}

function exportJSON(){

let blob=new Blob(
[JSON.stringify(invoices,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="invoices.json";

a.click();

}

function downloadBackup(){

let backup={
invoices,
ledger
};

let blob=new Blob(
[JSON.stringify(backup,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="QuelouERPBackup.json";

a.click();

}

</script>

</body>
</html>
