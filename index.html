<!--
QUelou ERP AI PRO
FULL ACCOUNTING + PRINTABLE INVOICE + OFFICIAL RECEIPT
COPY PASTE READY
-->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quelou System, your #1 Solution world-wide</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>

:root{
    --blue:#0a84ff;
    --green:#22c55e;
    --orange:#f59e0b;
    --red:#ef4444;
    --bg:#f4f7fb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
}

button{
    cursor:pointer;
}

.login{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:100%;
    max-width:400px;
    background:white;
    padding:35px;
    border-radius:20px;
}

.input{
    width:100%;
    padding:14px;
    border:none;
    background:#f1f5f9;
    border-radius:12px;
    margin-top:12px;
}

.btn{
    border:none;
    padding:13px 18px;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

.primary{background:var(--blue);}
.green{background:var(--green);}
.orange{background:var(--orange);}
.red{background:var(--red);}

.app{
    display:flex;
}

.sidebar{
    width:260px;
    background:white;
    padding:20px;
    min-height:100vh;
}

.sidebar h2{
    color:var(--blue);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:20px;
}

.menu button{
    border:none;
    padding:14px;
    border-radius:12px;
    text-align:left;
    background:#f1f5f9;
    font-weight:bold;
}

.menu button:hover{
    background:var(--blue);
    color:white;
}

.main{
    flex:1;
    padding:20px;
}

.topbar{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
}

.card h3{
    color:gray;
}

.value{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}

.table-box{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

.status-paid{
    background:#dcfce7;
    color:#166534;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
}

.status-pending{
    background:#fef3c7;
    color:#92400e;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}

.popup-box{
    width:100%;
    max-width:1000px;
    max-height:90vh;
    overflow:auto;
    background:white;
    border-radius:20px;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

textarea{
    width:100%;
    min-height:90px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    padding:14px;
    background:#f1f5f9;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

/* PRINT */

.print-area{
    background:white;
    padding:40px;
    width:800px;
    margin:auto;
}

.print-title{
    text-align:center;
    margin-bottom:20px;
}

.print-title h1{
    color:var(--blue);
}

.invoice-head{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.invoice-box{
    border:1px solid #ddd;
    padding:12px;
    border-radius:12px;
}

.total-box{
    margin-top:20px;
    width:300px;
    margin-left:auto;
}

.total-box table{
    min-width:auto;
}

@media print{

body *{
    visibility:hidden;
}

#printSection,
#printSection *{
    visibility:visible;
}

#printSection{
    position:absolute;
    left:0;
    top:0;
    width:100%;
}

}

@media(max-width:900px){

.app{
    flex-direction:column;
}

.sidebar{
    width:100%;
    min-height:auto;
}

.grid{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div id="app"></div>

<div class="popup" id="popup">
    <div class="popup-box" id="popupBox"></div>
</div>

<script>

/* =========================
STORAGE
========================= */

function load(key){
    return JSON.parse(localStorage.getItem(key) || "[]");
}

function save(key,data){
    localStorage.setItem(key,JSON.stringify(data));
}

function money(v){
    return "₱"+Number(v).toLocaleString(undefined,{
        minimumFractionDigits:2
    });
}

/* =========================
DEFAULT LOGIN
========================= */

if(!localStorage.getItem("users")){

save("users",[{

    username:"admin",
    password:btoa("admin123"),
    role:"Super Admin"

}]);

}

/* =========================
DATABASE
========================= */

let invoices=load("invoices");
let ledger=load("ledger");
let receipts=load("receipts");

/* =========================
LOGIN
========================= */

if(!sessionStorage.getItem("user")){
    renderLogin();
}else{
    renderApp();
}

function renderLogin(){

document.getElementById("app").innerHTML=`

<div class="login">

<div class="login-card">

<h1 style="color:#0a84ff;">Quelou ERP</h1>

<p>AI Accounting System</p>

<input id="user" class="input" placeholder="Username">

<input id="pass" type="password" class="input" placeholder="Password">

<button class="btn primary"
style="width:100%;margin-top:15px;"
onclick="login()">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

let users=load("users");

let found=users.find(x=>

x.username===user &&
x.password===btoa(pass)

);

if(!found){
    alert("Invalid Login");
    return;
}

sessionStorage.setItem("user",JSON.stringify(found));

location.reload();

}

function logout(){

sessionStorage.removeItem("user");
location.reload();

}

/* =========================
APP
========================= */

function renderApp(){

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<h2>Quelou ERP</h2>

<div class="menu">

<button onclick="invoiceForm()">➕ Create Invoice</button>

<button onclick="receiptForm()">🧾 Official Receipt</button>

<button onclick="financialReport()">📑 Financial Reports</button>

<button onclick="logout()">🚪 Logout</button>

</div>

</div>

<div class="main">

<div class="topbar">

<h2>Quelou ERP AI PRO</h2>

</div>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value">
${money(
invoices.reduce((a,b)=>a+b.total,0)
)}
</div>
</div>

<div class="card">
<h3>Total Receipts</h3>
<div class="value">
${money(
receipts.reduce((a,b)=>a+b.amount,0)
)}
</div>
</div>

<div class="card">
<h3>Total Invoices</h3>
<div class="value">
${invoices.length}
</div>
</div>

</div>

<!-- INVOICES -->

<div class="table-box">

<h2>Invoices</h2>

<br>

<table id="invoiceTable">

<tr>
<th>Invoice No</th>
<th>Customer</th>
<th>Subtotal</th>
<th>VAT</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>

${invoices.map(i=>`

<tr>

<td>${i.invoiceNo}</td>
<td>${i.customer}</td>
<td>${money(i.subtotal)}</td>
<td>${money(i.vat)}</td>
<td>${money(i.total)}</td>

<td>

<span class="${
i.status==="PAID"
? "status-paid"
: "status-pending"
}">
${i.status}
</span>

</td>

<td>

<button class="btn primary"
onclick='printInvoice(${JSON.stringify(i)})'>
Print
</button>

</td>

</tr>

`).join("")}

</table>

</div>

<!-- RECEIPTS -->

<div class="table-box">

<h2>Official Receipts</h2>

<br>

<table>

<tr>
<th>OR No</th>
<th>Customer</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>

${receipts.map(r=>`

<tr>

<td>${r.orNo}</td>
<td>${r.customer}</td>
<td>${money(r.amount)}</td>
<td>${r.date}</td>

<td>

<button class="btn green"
onclick='printReceipt(${JSON.stringify(r)})'>
Print
</button>

</td>

</tr>

`).join("")}

</table>

</div>

<!-- LEDGER -->

<div class="table-box">

<h2>Detailed Accounting Entries</h2>

<br>

<table>

<tr>
<th>Date</th>
<th>Reference</th>
<th>Account Title</th>
<th>Debit</th>
<th>Credit</th>
</tr>

${ledger.map(l=>`

<tr>

<td>${l.date}</td>
<td>${l.reference}</td>
<td>${l.account}</td>
<td>${l.debit ? money(l.debit) : "-"}</td>
<td>${l.credit ? money(l.credit) : "-"}</td>

</tr>

`).join("")}

</table>

</div>

</div>

</div>

`;

}

/* =========================
POPUP
========================= */

function openPopup(html){

document.getElementById("popup").style.display="flex";
document.getElementById("popupBox").innerHTML=html;

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* =========================
INVOICE FORM
========================= */

function invoiceForm(){

openPopup(`

<h2>Create Sales Invoice</h2>

<div class="grid">

<input id="customer" class="input" placeholder="Customer Name">

<input id="tin" class="input" placeholder="TIN">

<input id="address" class="input" placeholder="Address">

<input id="item" class="input" placeholder="Item/Service">

<input id="qty" type="number" class="input" placeholder="Quantity">

<input id="price" type="number" class="input" placeholder="Unit Price">

<select id="status" class="input">

<option>PENDING</option>
<option>PAID</option>

</select>

<input id="terms" class="input" placeholder="Terms">

</div>

<textarea id="remarks"
placeholder="Remarks"></textarea>

<div class="actions">

<button class="btn primary"
onclick="saveInvoice()">
Save Invoice
</button>

<button class="btn red"
onclick="closePopup()">
Close
</button>

</div>

`);

}

function saveInvoice(){

let qty=Number(document.getElementById("qty").value);
let price=Number(document.getElementById("price").value);

let subtotal=qty*price;
let vat=subtotal*0.12;
let total=subtotal+vat;

let invoice={

invoiceNo:"INV-"+Date.now(),

customer:document.getElementById("customer").value,

tin:document.getElementById("tin").value,

address:document.getElementById("address").value,

item:document.getElementById("item").value,

qty,
price,
subtotal,
vat,
total,

status:document.getElementById("status").value,

terms:document.getElementById("terms").value,

remarks:document.getElementById("remarks").value,

date:new Date().toLocaleString()

};

invoices.push(invoice);

/* ACCOUNTING ENTRY */

if(invoice.status==="PAID"){

ledger.push({

date:invoice.date,
reference:invoice.invoiceNo,
account:"Cash",
debit:total,
credit:0

});

}else{

ledger.push({

date:invoice.date,
reference:invoice.invoiceNo,
account:"Accounts Receivable",
debit:total,
credit:0

});

}

ledger.push({

date:invoice.date,
reference:invoice.invoiceNo,
account:"Sales Revenue",
debit:0,
credit:subtotal

});

ledger.push({

date:invoice.date,
reference:invoice.invoiceNo,
account:"Output VAT",
debit:0,
credit:vat

});

save("invoices",invoices);
save("ledger",ledger);

alert("Invoice Saved");

closePopup();

renderApp();

}

/* =========================
OFFICIAL RECEIPT
========================= */

function receiptForm(){

openPopup(`

<h2>Create Official Receipt</h2>

<div class="grid">

<input id="rcustomer" class="input" placeholder="Customer Name">

<input id="ramount" type="number" class="input" placeholder="Amount">

<input id="rpayment" class="input" placeholder="Payment Method">

<input id="rremarks" class="input" placeholder="Remarks">

</div>

<div class="actions">

<button class="btn green"
onclick="saveReceipt()">
Save Receipt
</button>

<button class="btn red"
onclick="closePopup()">
Close
</button>

</div>

`);

}

function saveReceipt(){

let amount=Number(
document.getElementById("ramount").value
);

let receipt={

orNo:"OR-"+Date.now(),

customer:
document.getElementById("rcustomer").value,

amount,

payment:
document.getElementById("rpayment").value,

remarks:
document.getElementById("rremarks").value,

date:new Date().toLocaleString()

};

receipts.push(receipt);

/* ACCOUNTING ENTRY */

ledger.push({

date:receipt.date,
reference:receipt.orNo,
account:"Cash",
debit:amount,
credit:0

});

ledger.push({

date:receipt.date,
reference:receipt.orNo,
account:"Accounts Receivable",
debit:0,
credit:amount

});

save("receipts",receipts);
save("ledger",ledger);

alert("Receipt Saved");

closePopup();

renderApp();

}

/* =========================
PRINT INVOICE
========================= */

function printInvoice(data){

let html=`

<div id="printSection">

<div class="print-area">

<div class="print-title">

<h1>QUelou ERP</h1>

<h2>SALES INVOICE</h2>

</div>

<div class="invoice-head">

<div class="invoice-box">

<b>Bill To:</b><br><br>

${data.customer}<br>
${data.address}<br>
TIN: ${data.tin}

</div>

<div class="invoice-box">

Invoice No: ${data.invoiceNo}<br>
Date: ${data.date}<br>
Terms: ${data.terms}

</div>

</div>

<table>

<tr>
<th>Description</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

<tr>

<td>${data.item}</td>
<td>${data.qty}</td>
<td>${money(data.price)}</td>
<td>${money(data.subtotal)}</td>

</tr>

</table>

<div class="total-box">

<table>

<tr>
<td>Subtotal</td>
<td>${money(data.subtotal)}</td>
</tr>

<tr>
<td>VAT 12%</td>
<td>${money(data.vat)}</td>
</tr>

<tr>
<td><b>Grand Total</b></td>
<td><b>${money(data.total)}</b></td>
</tr>

</table>

</div>

<br><br>

Remarks:<br>
${data.remarks}

<br><br><br>

_________________________<br>
Authorized Signature

</div>

</div>

`;

let w=window.open("");

w.document.write(html);

w.document.close();

w.print();

}

/* =========================
PRINT RECEIPT
========================= */

function printReceipt(data){

let html=`

<div id="printSection">

<div class="print-area">

<div class="print-title">

<h1>QUelou ERP</h1>

<h2>OFFICIAL RECEIPT</h2>

</div>

<br>

Receipt No: ${data.orNo}<br>
Date: ${data.date}<br><br>

Received From:<br>
<b>${data.customer}</b>

<br><br>

Amount Received:
<h2>${money(data.amount)}</h2>

Payment Method:
${data.payment}

<br><br>

Remarks:
${data.remarks}

<br><br><br>

_________________________<br>
Cashier Signature

</div>

</div>

`;

let w=window.open("");

w.document.write(html);

w.document.close();

w.print();

}

/* =========================
REPORT
========================= */

function financialReport(){

let sales=invoices.reduce((a,b)=>a+b.total,0);

let collected=receipts.reduce((a,b)=>a+b.amount,0);

alert(

"FINANCIAL REPORT\n\n"+

"Total Sales: "+money(sales)+"\n"+

"Cash Collection: "+money(collected)+"\n"+

"Accounts Receivable: "+
money(sales-collected)

);

}

</script>
</body>
</html>
