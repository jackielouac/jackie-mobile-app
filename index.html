<!-- ========================= -->
<!-- ADD THIS MENU BUTTONS -->
<!-- PLACE INSIDE .menu -->
<!-- ========================= -->

<button onclick="openPopup('invoicePopup')">
    🧾 Sales Invoice Transaction
</button>

<button onclick="openPopup('receiptPopup')">
    💵 Collection Transaction
</button>

<button onclick="openPopup('purchasePopup')">
    📦 Purchase Transaction
</button>

<button onclick="openPopup('disbursementPopup')">
    💸 Disbursement Transaction
</button>

<button onclick="openCustomerMaster()">
    👥 Customer Masterlist
</button>

<button onclick="openSupplierMaster()">
    🏭 Supplier Masterlist
</button>

<!-- ========================= -->
<!-- INVOICE POPUP -->
<!-- ========================= -->

<div class="popup" id="invoicePopup">

    <div class="popup-box">

        <h2>Sales Invoice Entry</h2>

        <input type="text"
        id="invNumber"
        placeholder="Invoice Number">

        <input type="text"
        id="invCustomer"
        placeholder="Customer Name">

        <input type="number"
        id="invAmount"
        placeholder="Invoice Amount">

        <select id="invStatus">

            <option value="Pending">
                Pending
            </option>

            <option value="Paid">
                Paid
            </option>

        </select>

        <textarea id="invRemarks"
        placeholder="Remarks"></textarea>

        <div class="popup-buttons">

            <button class="primary"
            onclick="saveInvoice()">
                Save Invoice
            </button>

            <button class="secondary"
            onclick="closePopup('invoicePopup')">
                Close
            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- RECEIPT POPUP -->
<!-- ========================= -->

<div class="popup" id="receiptPopup">

    <div class="popup-box">

        <h2>Collection Receipt</h2>

        <input type="text"
        id="rcptNumber"
        placeholder="Receipt Number">

        <input type="text"
        id="rcptCustomer"
        placeholder="Customer Name">

        <input type="number"
        id="rcptAmount"
        placeholder="Collected Amount">

        <textarea id="rcptRemarks"
        placeholder="Remarks"></textarea>

        <div class="popup-buttons">

            <button class="primary"
            onclick="saveReceipt()">
                Save Receipt
            </button>

            <button class="secondary"
            onclick="closePopup('receiptPopup')">
                Close
            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- PURCHASE POPUP -->
<!-- ========================= -->

<div class="popup" id="purchasePopup">

    <div class="popup-box">

        <h2>Purchase Entry</h2>

        <input type="text"
        id="poNumber"
        placeholder="PO Number">

        <input type="text"
        id="poSupplier"
        placeholder="Supplier Name">

        <input type="number"
        id="poAmount"
        placeholder="Purchase Amount">

        <textarea id="poRemarks"
        placeholder="Remarks"></textarea>

        <div class="popup-buttons">

            <button class="primary"
            onclick="savePurchase()">
                Save Purchase
            </button>

            <button class="secondary"
            onclick="closePopup('purchasePopup')">
                Close
            </button>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- DISBURSEMENT POPUP -->
<!-- ========================= -->

<div class="popup" id="disbursementPopup">

    <div class="popup-box">

        <h2>Cash Disbursement</h2>

        <input type="text"
        id="cvNumber"
        placeholder="CV Number">

        <input type="text"
        id="cvPayee"
        placeholder="Payee">

        <input type="number"
        id="cvAmount"
        placeholder="Disbursement Amount">

        <textarea id="cvRemarks"
        placeholder="Remarks"></textarea>

        <div class="popup-buttons">

            <button class="primary"
            onclick="saveDisbursement()">
                Save Disbursement
            </button>

            <button class="secondary"
            onclick="closePopup('disbursementPopup')">
                Close
            </button>

        </div>

    </div>

</div>

<script>

/* ========================= */
/* SAVE INVOICE */
/* ========================= */

function saveInvoice(){

    let invoice = {

        number:
        document.getElementById("invNumber").value,

        customer:
        document.getElementById("invCustomer").value,

        amount:
        document.getElementById("invAmount").value,

        status:
        document.getElementById("invStatus").value,

        remarks:
        document.getElementById("invRemarks").value,

        date:
        new Date().toLocaleString()

    };

    invoices.push(invoice);

    localStorage.setItem(
        "invoices",
        JSON.stringify(invoices)
    );

    addAudit(
        "Sales Invoice Saved : " +
        invoice.number
    );

    renderInvoices();

    updateCards();

    closePopup("invoicePopup");

    alert("Invoice Saved");

}

/* ========================= */
/* SAVE RECEIPT */
/* ========================= */

function saveReceipt(){

    let receipt = {

        number:
        document.getElementById("rcptNumber").value,

        customer:
        document.getElementById("rcptCustomer").value,

        amount:
        document.getElementById("rcptAmount").value,

        remarks:
        document.getElementById("rcptRemarks").value,

        date:
        new Date().toLocaleString()

    };

    receipts.push(receipt);

    localStorage.setItem(
        "receipts",
        JSON.stringify(receipts)
    );

    addAudit(
        "Collection Saved : " +
        receipt.number
    );

    updateCards();

    closePopup("receiptPopup");

    alert("Collection Saved");

}

/* ========================= */
/* SAVE PURCHASE */
/* ========================= */

function savePurchase(){

    let purchase = {

        number:
        document.getElementById("poNumber").value,

        supplier:
        document.getElementById("poSupplier").value,

        amount:
        document.getElementById("poAmount").value,

        remarks:
        document.getElementById("poRemarks").value,

        date:
        new Date().toLocaleString()

    };

    purchases.push(purchase);

    localStorage.setItem(
        "purchases",
        JSON.stringify(purchases)
    );

    addAudit(
        "Purchase Saved : " +
        purchase.number
    );

    closePopup("purchasePopup");

    alert("Purchase Saved");

}

/* ========================= */
/* SAVE DISBURSEMENT */
/* ========================= */

function saveDisbursement(){

    let disbursement = {

        number:
        document.getElementById("cvNumber").value,

        payee:
        document.getElementById("cvPayee").value,

        amount:
        document.getElementById("cvAmount").value,

        remarks:
        document.getElementById("cvRemarks").value,

        date:
        new Date().toLocaleString()

    };

    disbursements.push(disbursement);

    localStorage.setItem(
        "disbursements",
        JSON.stringify(disbursements)
    );

    addAudit(
        "Disbursement Saved : " +
        disbursement.number
    );

    closePopup("disbursementPopup");

    alert("Disbursement Saved");

}

/* ========================= */
/* CUSTOMER MASTERLIST */
/* ========================= */

function openCustomerMaster(){

    let html = `

    <h2 style="margin-bottom:20px;">
        Customer Masterlist
    </h2>

    <table>

        <tr>

            <th>Name</th>
            <th>Address</th>
            <th>TIN</th>
            <th>Contact</th>

        </tr>

    `;

    customers.forEach(c=>{

        html += `

        <tr>

            <td>${c.name}</td>
            <td>${c.address}</td>
            <td>${c.tin}</td>
            <td>${c.contact}</td>

        </tr>

        `;

    });

    html += `</table>`;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

/* ========================= */
/* SUPPLIER MASTERLIST */
/* ========================= */

function openSupplierMaster(){

    let html = `

    <h2 style="margin-bottom:20px;">
        Supplier Masterlist
    </h2>

    <table>

        <tr>

            <th>Supplier</th>
            <th>Amount</th>
            <th>Date</th>

        </tr>

    `;

    purchases.forEach(p=>{

        html += `

        <tr>

            <td>${p.supplier}</td>

            <td>
                ₱${Number(p.amount)
                .toLocaleString()}
            </td>

            <td>${p.date}</td>

        </tr>

        `;

    });

    html += `</table>`;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

/* ========================= */
/* CLICKABLE TRANSACTION */
/* ========================= */

function renderInvoices(){

    let table =
    document.getElementById("transactionTable");

    table.innerHTML = `

    <tr>

        <th>Invoice</th>
        <th>Customer</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>

    </tr>

    `;

    invoices.forEach((inv,index)=>{

        table.innerHTML += `

        <tr onclick="viewInvoice(${index})"
        style="cursor:pointer;">

            <td>${inv.number}</td>

            <td>${inv.customer}</td>

            <td>
                ₱${Number(inv.amount)
                .toLocaleString()}
            </td>

            <td>

                <span class="${
                    inv.status === 'Paid'
                    ? 'status-paid'
                    : 'status-pending'
                }">

                    ${inv.status}

                </span>

            </td>

            <td>${inv.date}</td>

        </tr>

        `;

    });

}

/* ========================= */
/* VIEW TRANSACTION */
/* ========================= */

function viewInvoice(index){

    let inv = invoices[index];

    let html = `

    <div class="ai-box">

        <h2>
            Invoice Details
        </h2>

        <br>

        <b>Invoice No:</b>
        ${inv.number}

        <br><br>

        <b>Customer:</b>
        ${inv.customer}

        <br><br>

        <b>Amount:</b>
        ₱${Number(inv.amount)
        .toLocaleString()}

        <br><br>

        <b>Status:</b>
        ${inv.status}

        <br><br>

        <b>Remarks:</b>
        ${inv.remarks}

        <br><br>

        <b>Date:</b>
        ${inv.date}

    </div>

    `;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

</script>
