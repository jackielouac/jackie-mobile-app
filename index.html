<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quelou ERP • iOS Accounting System</title>

<style>

/* ================================= */
/* ROOT */
/* ================================= */

:root{

    --ios-blue:#0a84ff;
    --ios-blue-light:#5ac8fa;
    --ios-green:#30d158;
    --ios-orange:#ff9f0a;
    --ios-red:#ff453a;

    --bg:#f5f5f7;
    --card:#ffffffcc;
    --text:#111827;
    --muted:#6b7280;
    --line:#e5e7eb;

    --shadow:
    0 10px 30px rgba(0,0,0,.06);

}

/* ================================= */
/* GLOBAL */
/* ================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    "Segoe UI",
    sans-serif;
}

body{

    background:
    linear-gradient(
    180deg,
    #f8f8fa,
    #eef1f6
    );

    color:var(--text);

    overflow-x:hidden;
}

/* ================================= */
/* APP */
/* ================================= */

.app{
    display:flex;
    min-height:100vh;
}

/* ================================= */
/* SIDEBAR */
/* ================================= */

.sidebar{

    width:320px;

    padding:24px;

    background:
    rgba(255,255,255,.72);

    backdrop-filter:blur(30px);

    border-right:
    1px solid rgba(255,255,255,.6);

    position:sticky;
    top:0;
    height:100vh;
}

.logo{

    display:flex;
    align-items:center;
    gap:15px;

    margin-bottom:35px;
}

.logo-icon{

    width:70px;
    height:70px;

    border-radius:24px;

    background:
    linear-gradient(
    145deg,
    var(--ios-blue),
    var(--ios-blue-light)
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:24px;
    font-weight:700;

    box-shadow:
    0 10px 25px rgba(10,132,255,.25);

}

.logo p{
    color:var(--muted);
    margin-top:4px;
}

/* ================================= */
/* MENU */
/* ================================= */

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu button{

    border:none;

    padding:16px;

    border-radius:22px;

    background:
    rgba(255,255,255,.92);

    box-shadow:var(--shadow);

    font-size:15px;
    font-weight:600;

    text-align:left;

    cursor:pointer;

    transition:.25s;
}

.menu button:hover{

    transform:
    translateY(-2px);

    background:
    linear-gradient(
    145deg,
    var(--ios-blue),
    var(--ios-blue-light)
    );

    color:white;
}

/* ================================= */
/* MAIN */
/* ================================= */

.main{
    flex:1;
    padding:28px;
}

/* ================================= */
/* TOPBAR */
/* ================================= */

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:28px;
}

.topbar h1{
    font-size:38px;
    font-weight:700;
}

.topbar p{
    color:var(--muted);
    margin-top:4px;
}

.user-badge{

    background:white;

    padding:14px 20px;

    border-radius:18px;

    box-shadow:var(--shadow);

    font-size:14px;
}

/* ================================= */
/* CARDS */
/* ================================= */

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

    gap:20px;

    margin-bottom:28px;
}

.card{

    background:var(--card);

    backdrop-filter:blur(25px);

    border-radius:30px;

    padding:24px;

    box-shadow:var(--shadow);

    transition:.25s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h3{

    color:var(--muted);

    margin-bottom:10px;

    font-size:15px;
}

.card .value{

    font-size:34px;

    font-weight:700;
}

.blue{
    color:var(--ios-blue);
}

.green{
    color:var(--ios-green);
}

.orange{
    color:var(--ios-orange);
}

.red{
    color:var(--ios-red);
}

/* ================================= */
/* SEARCH */
/* ================================= */

.search-box{

    display:flex;

    gap:12px;

    margin-bottom:25px;
}

.search-box input{

    flex:1;

    padding:16px;

    border:none;

    border-radius:20px;

    background:white;

    box-shadow:var(--shadow);

    font-size:15px;
}

.search-btn{

    border:none;

    padding:16px 22px;

    border-radius:20px;

    background:
    linear-gradient(
    145deg,
    var(--ios-blue),
    var(--ios-blue-light)
    );

    color:white;

    font-weight:700;

    cursor:pointer;

    box-shadow:
    0 10px 25px rgba(10,132,255,.25);
}

/* ================================= */
/* TABLE */
/* ================================= */

.table-box{

    background:var(--card);

    backdrop-filter:blur(25px);

    border-radius:32px;

    padding:24px;

    box-shadow:var(--shadow);
}

.table-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:18px;
}

.table-header h2{
    font-size:24px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{

    text-align:left;

    color:var(--muted);

    padding:16px;

    border-bottom:
    1px solid var(--line);
}

table td{

    padding:18px 16px;

    border-bottom:
    1px solid #f2f2f2;
}

table tr{

    transition:.2s;
}

table tr:hover{

    background:#f8fafc;

    cursor:pointer;
}

/* ================================= */
/* STATUS */
/* ================================= */

.status-paid{

    background:
    rgba(48,209,88,.12);

    color:var(--ios-green);

    padding:8px 14px;

    border-radius:999px;

    font-size:13px;

    font-weight:700;
}

.status-pending{

    background:
    rgba(255,159,10,.12);

    color:var(--ios-orange);

    padding:8px 14px;

    border-radius:999px;

    font-size:13px;

    font-weight:700;
}

/* ================================= */
/* POPUP */
/* ================================= */

.popup{

    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,.35);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.popup-box{

    width:95%;
    max-width:850px;

    background:
    rgba(255,255,255,.9);

    backdrop-filter:blur(35px);

    border-radius:36px;

    padding:30px;

    max-height:90vh;

    overflow:auto;

    box-shadow:
    0 20px 60px rgba(0,0,0,.18);
}

.popup-title{

    margin-bottom:22px;

    font-size:28px;
}

.popup-box input,
.popup-box select,
.popup-box textarea{

    width:100%;

    padding:18px;

    margin-bottom:15px;

    border:none;

    border-radius:20px;

    background:#f3f4f6;

    font-size:15px;
}

.popup-box textarea{
    min-height:120px;
    resize:none;
}

.popup-buttons{

    display:flex;

    gap:12px;

    margin-top:10px;
}

.primary-btn{

    flex:1;

    border:none;

    padding:16px;

    border-radius:22px;

    background:
    linear-gradient(
    145deg,
    var(--ios-blue),
    var(--ios-blue-light)
    );

    color:white;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    box-shadow:
    0 12px 24px rgba(10,132,255,.25);
}

.secondary-btn{

    flex:1;

    border:none;

    padding:16px;

    border-radius:22px;

    background:#e5e7eb;

    color:#111827;

    font-size:15px;
    font-weight:700;

    cursor:pointer;
}

/* ================================= */
/* LOGIN */
/* ================================= */

.login-screen{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    180deg,
    #f8f9fb,
    #eef2f7
    );

    z-index:10000;
}

.login-box{

    width:95%;
    max-width:420px;

    background:
    rgba(255,255,255,.88);

    backdrop-filter:blur(35px);

    padding:35px;

    border-radius:40px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.08);
}

.login-box h1{

    font-size:34px;

    margin-bottom:10px;
}

.login-box p{

    color:var(--muted);

    margin-bottom:20px;
}

.login-box input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:20px;

    background:#f3f4f6;

    margin-bottom:15px;
}

.login-btn{

    width:100%;

    border:none;

    padding:16px;

    border-radius:22px;

    background:
    linear-gradient(
    145deg,
    var(--ios-blue),
    var(--ios-blue-light)
    );

    color:white;

    font-size:16px;
    font-weight:700;

    cursor:pointer;
}

/* ================================= */
/* AI BOX */
/* ================================= */

.ai-box{

    background:#f9fafb;

    padding:24px;

    border-radius:24px;

    line-height:1.8;
}

/* ================================= */
/* MOBILE */
/* ================================= */

@media(max-width:900px){

    .app{
        flex-direction:column;
    }

    .sidebar{

        width:100%;
        height:auto;

        position:relative;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

}

</style>

</head>

<body>

<!-- ================================= -->
<!-- LOGIN -->
<!-- ================================= -->

<div class="login-screen"
id="loginScreen">

    <div class="login-box">

        <h1> AJ Accounting</h1>

        <p>
            Quelou ERP iOS Edition
        </p>

        <input type="text"
        id="username"
        placeholder="Username">

        <input type="password"
        id="password"
        placeholder="Password">

        <button class="login-btn"
        onclick="login()">
            Login
        </button>

    </div>

</div>

<!-- ================================= -->
<!-- APP -->
<!-- ================================= -->

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">

            <div class="logo-icon">
                AJ
            </div>

            <div>

                <h2>Quelou ERP</h2>

                <p>
                    Smart AI Accounting
                </p>

            </div>

        </div>

        <div class="menu">

            <button onclick="openPopup('invoicePopup')">
                🧾 Sales Invoice
            </button>

            <button onclick="generateFinancialSummary()">
                📈 Financial Report
            </button>

            <button onclick="generateAISummary()">
                🤖 AI Insights
            </button>

            <button onclick="topCustomers()">
                👑 Top Customers
            </button>

            <button onclick="smartForecast()">
                📊 AI Forecast
            </button>

            <button onclick="downloadBackup()">
                💾 Backup Data
            </button>

            <button onclick="clearAllData()">
                🗑️ Reset System
            </button>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main">

        <!-- TOPBAR -->

        <div class="topbar">

            <div>

                <h1>Dashboard</h1>

                <p>
                    Real-time AI Accounting Analytics
                </p>

            </div>

            <div class="user-badge">

                Logged in :
                <b id="currentUser"></b>

            </div>

        </div>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">

                <h3>Total Sales</h3>

                <div class="value blue"
                id="totalSales">
                    ₱0
                </div>

            </div>

            <div class="card">

                <h3>Collections</h3>

                <div class="value green"
                id="totalCollection">
                    ₱0
                </div>

            </div>

            <div class="card">

                <h3>Receivables</h3>

                <div class="value orange"
                id="receivables">
                    ₱0
                </div>

            </div>

            <div class="card">

                <h3>Net Profit</h3>

                <div class="value red"
                id="netProfit">
                    ₱0
                </div>

            </div>

        </div>

        <!-- SEARCH -->

        <div class="search-box">

            <input type="text"
            id="searchInvoice"
            placeholder="Search invoice or customer">

            <button class="search-btn"
            onclick="searchInvoices()">
                Search
            </button>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <div class="table-header">

                <h2>
                    Recent Transactions
                </h2>

            </div>

            <table>

                <tbody id="transactionTable">

                    <tr>

                        <th>Invoice</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- ================================= -->
<!-- INVOICE POPUP -->
<!-- ================================= -->

<div class="popup"
id="invoicePopup">

    <div class="popup-box">

        <h2 class="popup-title">
            Sales Invoice
        </h2>

        <input type="text"
        id="invNumber"
        placeholder="Invoice Number">

        <input type="text"
        id="invCustomer"
        placeholder="Customer Name">

        <input type="number"
        id="invAmount"
        placeholder="Invoice Amount">

        <select id="invStatus">

            <option value="Pending">
                Pending
            </option>

            <option value="Paid">
                Paid
            </option>

        </select>

        <textarea id="invRemarks"
        placeholder="Remarks"></textarea>

        <div class="popup-buttons">

            <button class="primary-btn"
            onclick="saveInvoice()">
                Save Invoice
            </button>

            <button class="secondary-btn"
            onclick="closePopup('invoicePopup')">
                Close
            </button>

        </div>

    </div>

</div>

<!-- ================================= -->
<!-- REPORT POPUP -->
<!-- ================================= -->

<div class="popup"
id="reportPopup">

    <div class="popup-box">

        <div id="reportContent"></div>

        <div class="popup-buttons">

            <button class="primary-btn"
            onclick="window.print()">
                Print
            </button>

            <button class="secondary-btn"
            onclick="closePopup('reportPopup')">
                Close
            </button>

        </div>

    </div>

</div>

<script>

/* ================================= */
/* DATABASE */
/* ================================= */

let users =
JSON.parse(
localStorage.getItem("users")
) || [

{
    username:"jackie",
    password:"@dm1nEvo"
}

];

let invoices =
JSON.parse(
localStorage.getItem("invoices")
) || [];

/* ================================= */
/* LOGIN */
/* ================================= */

function login(){

    let user =
    document.getElementById("username").value;

    let pass =
    document.getElementById("password").value;

    let found =
    users.find(u=>

        u.username===user &&
        u.password===pass

    );

    if(found){

        document.getElementById("loginScreen")
        .style.display="none";

        document.getElementById("currentUser")
        .innerHTML=found.username;

        renderInvoices();

        updateCards();

    }else{

        alert("Invalid Login");

    }

}

/* ================================= */
/* POPUPS */
/* ================================= */

function openPopup(id){

    document.getElementById(id)
    .style.display="flex";

}

function closePopup(id){

    document.getElementById(id)
    .style.display="none";

}

/* ================================= */
/* SAVE INVOICE */
/* ================================= */

function saveInvoice(){

    let invoice = {

        number:
        document.getElementById("invNumber").value,

        customer:
        document.getElementById("invCustomer").value,

        amount:
        document.getElementById("invAmount").value,

        status:
        document.getElementById("invStatus").value,

        remarks:
        document.getElementById("invRemarks").value,

        date:
        new Date().toLocaleString()

    };

    if(
        invoice.number === "" ||
        invoice.customer === "" ||
        invoice.amount === ""
    ){

        alert("Complete all required fields");
        return;

    }

    invoices.push(invoice);

    localStorage.setItem(
        "invoices",
        JSON.stringify(invoices)
    );

    renderInvoices();

    updateCards();

    closePopup("invoicePopup");

    clearInvoiceForm();

    alert("Invoice Saved");

}

/* ================================= */
/* CLEAR FORM */
/* ================================= */

function clearInvoiceForm(){

    document.getElementById("invNumber").value="";
    document.getElementById("invCustomer").value="";
    document.getElementById("invAmount").value="";
    document.getElementById("invRemarks").value="";

}

/* ================================= */
/* RENDER TABLE */
/* ================================= */

function renderInvoices(){

    let table =
    document.getElementById("transactionTable");

    table.innerHTML = `

    <tr>

        <th>Invoice</th>
        <th>Customer</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>

    </tr>

    `;

    invoices.forEach((inv,index)=>{

        table.innerHTML += `

        <tr onclick="viewInvoice(${index})">

            <td>${inv.number}</td>

            <td>${inv.customer}</td>

            <td>
                ₱${Number(inv.amount)
                .toLocaleString()}
            </td>

            <td>

                <span class="${
                    inv.status==="Paid"
                    ?
                    "status-paid"
                    :
                    "status-pending"
                }">

                    ${inv.status}

                </span>

            </td>

            <td>${inv.date}</td>

        </tr>

        `;

    });

}

/* ================================= */
/* VIEW INVOICE */
/* ================================= */

function viewInvoice(index){

    let inv = invoices[index];

    let html = `

    <div class="ai-box">

        <h2>
            Invoice Details
        </h2>

        <br>

        <b>Invoice No:</b>
        ${inv.number}

        <br><br>

        <b>Customer:</b>
        ${inv.customer}

        <br><br>

        <b>Amount:</b>
        ₱${Number(inv.amount)
        .toLocaleString()}

        <br><br>

        <b>Status:</b>
        ${inv.status}

        <br><br>

        <b>Remarks:</b>
        ${inv.remarks}

        <br><br>

        <b>Date:</b>
        ${inv.date}

    </div>

    `;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

/* ================================= */
/* UPDATE CARDS */
/* ================================= */

function updateCards(){

    let sales = 0;
    let collection = 0;

    invoices.forEach(i=>{

        sales += Number(i.amount);

        if(i.status==="Paid"){

            collection += Number(i.amount);

        }

    });

    let receivables =
    sales - collection;

    document.getElementById("totalSales")
    .innerHTML =
    "₱"+sales.toLocaleString();

    document.getElementById("totalCollection")
    .innerHTML =
    "₱"+collection.toLocaleString();

    document.getElementById("receivables")
    .innerHTML =
    "₱"+receivables.toLocaleString();

    document.getElementById("netProfit")
    .innerHTML =
    "₱"+collection.toLocaleString();

}

/* ================================= */
/* SEARCH */
/* ================================= */

function searchInvoices(){

    let keyword =
    document.getElementById("searchInvoice")
    .value
    .toLowerCase();

    let table =
    document.getElementById("transactionTable");

    table.innerHTML = `

    <tr>

        <th>Invoice</th>
        <th>Customer</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>

    </tr>

    `;

    invoices
    .filter(inv=>

        inv.number
        .toLowerCase()
        .includes(keyword)

        ||

        inv.customer
        .toLowerCase()
        .includes(keyword)

    )

    .forEach((inv,index)=>{

        table.innerHTML += `

        <tr onclick="viewInvoice(${index})">

            <td>${inv.number}</td>

            <td>${inv.customer}</td>

            <td>
                ₱${Number(inv.amount)
                .toLocaleString()}
            </td>

            <td>${inv.status}</td>

            <td>${inv.date}</td>

        </tr>

        `;

    });

}

/* ================================= */
/* FINANCIAL REPORT */
/* ================================= */

function generateFinancialSummary(){

    let sales = 0;

    invoices.forEach(i=>{

        sales += Number(i.amount);

    });

    let html = `

    <div class="ai-box">

        <h2>
            Financial Summary
        </h2>

        <br>

        Total Revenue :
        ₱${sales.toLocaleString()}

        <br><br>

        Active Invoices :
        ${invoices.length}

        <br><br>

        Collection Performance :
        Excellent

        <br><br>

        AI Recommendations :

        <br><br>

        • Maintain healthy cashflow

        <br>

        • Improve customer retention

        <br>

        • Expand recurring clients

    </div>

    `;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

/* ================================= */
/* AI INSIGHTS */
/* ================================= */

function generateAISummary(){

    alert(`

🤖 AI BUSINESS INSIGHTS

• Revenue growth stable

• Collections improving

• Customer retention healthy

• Suggested Action:
Expand monthly recurring clients

`);

}

/* ================================= */
/* TOP CUSTOMERS */
/* ================================= */

function topCustomers(){

    let totals = {};

    invoices.forEach(inv=>{

        if(!totals[inv.customer]){

            totals[inv.customer]=0;

        }

        totals[inv.customer]+=
        Number(inv.amount);

    });

    let text =
    "👑 TOP CUSTOMERS\n\n";

    for(let c in totals){

        text += `

${c}
₱${totals[c].toLocaleString()}

`;

    }

    alert(text);

}

/* ================================= */
/* FORECAST */
/* ================================= */

function smartForecast(){

    let sales = 0;

    invoices.forEach(i=>{

        sales += Number(i.amount);

    });

    let projected =
    sales * 1.15;

    let html = `

    <div class="ai-box">

        <h2>
            AI Forecast
        </h2>

        <br>

        Current Revenue :
        ₱${sales.toLocaleString()}

        <br><br>

        Projected Revenue :
        ₱${projected.toLocaleString()}

        <br><br>

        Estimated Growth :
        15%

    </div>

    `;

    document.getElementById("reportContent")
    .innerHTML = html;

    openPopup("reportPopup");

}

/* ================================= */
/* BACKUP */
/* ================================= */

function downloadBackup(){

    let data = {

        invoices

    };

    let blob =
    new Blob(

        [JSON.stringify(data,null,2)],

        {
            type:"application/json"
        }

    );

    let a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "QuelouERP_Backup.json";

    a.click();

}

/* ================================= */
/* RESET */
/* ================================= */

function clearAllData(){

    let confirmReset =
    confirm(
        "Delete all records?"
    );

    if(confirmReset){

        localStorage.clear();

        location.reload();

    }

}

/* ================================= */
/* CLOSE POPUP CLICK */
/* ================================= */

window.onclick=function(e){

    document.querySelectorAll(".popup")
    .forEach(function(popup){

        if(e.target===popup){

            popup.style.display="none";

        }

    });

}

</script>
