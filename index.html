<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quelou ERP AI Accounting System</title>

<style>

:root{
    --blue:#0a84ff;
    --green:#30d158;
    --orange:#ff9f0a;
    --red:#ff453a;
    --bg:#f5f5f7;
    --card:#ffffff;
    --text:#111827;
    --line:#e5e7eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

.app{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:300px;
    background:white;
    padding:25px;
    border-right:1px solid var(--line);
    overflow:auto;
}

.logo{
    margin-bottom:25px;
}

.logo h2{
    color:var(--blue);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu button{
    border:none;
    padding:16px;
    border-radius:18px;
    background:#f3f4f6;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.menu button:hover{
    background:var(--blue);
    color:white;
}

.main{
    flex:1;
    padding:25px;
    padding-top:95px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
    color:gray;
    margin-bottom:10px;
}

.card .value{
    font-size:32px;
    font-weight:bold;
}

.blue{color:var(--blue);}
.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}

.table-box{
    background:white;
    border-radius:25px;
    padding:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.popup-box{
    width:100%;
    max-width:850px;
    background:white;
    border-radius:30px;
    padding:30px;
    max-height:90vh;
    overflow:auto;
}

.popup-box input,
.popup-box select,
.popup-box textarea{
    width:100%;
    padding:15px;
    margin-bottom:12px;
    border:none;
    border-radius:15px;
    background:#f3f4f6;
}

.primary-btn{
    border:none;
    padding:15px 20px;
    border-radius:18px;
    background:var(--blue);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.secondary-btn{
    border:none;
    padding:15px 20px;
    border-radius:18px;
    background:#ddd;
    cursor:pointer;
}

.danger-btn{
    border:none;
    padding:10px 15px;
    border-radius:12px;
    background:var(--red);
    color:white;
    cursor:pointer;
}

.status-paid{
    background:rgba(48,209,88,.15);
    color:var(--green);
    padding:7px 12px;
    border-radius:999px;
    font-weight:bold;
}

.status-pending{
    background:rgba(255,159,10,.15);
    color:var(--orange);
    padding:7px 12px;
    border-radius:999px;
    font-weight:bold;
}

.topbar{
    position:fixed;
    top:0;
    left:300px;
    right:0;
    height:75px;
    background:white;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    z-index:999;
}

.user-badge{
    padding:10px 15px;
    border-radius:999px;
    background:#f3f4f6;
    font-weight:bold;
}

.logout-btn{
    border:none;
    padding:12px 18px;
    border-radius:14px;
    background:var(--red);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.login-wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:40px;
    border-radius:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.login-card h1{
    color:var(--blue);
    margin-bottom:10px;
}

.login-input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#f3f4f6;
    margin-bottom:15px;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:var(--blue);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:768px){

.app{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.topbar{
    left:0;
}

.main{
    padding-top:110px;
}

.cards{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div id="app"></div>

<script>

/* ========================= */
/* STORAGE */
/* ========================= */

function loadData(key){
    return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
    localStorage.setItem(key,JSON.stringify(data));
}

function sanitize(str){
    return String(str)
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ========================= */
/* DEFAULT USERS */
/* ========================= */

const defaultUsers = [

status:"Active"
},

{
id:2,

/* ========================= */
/* AUTH */
/* ========================= */

function renderLogin(){

document.getElementById("app").innerHTML = `

<div class="login-wrapper">

<div class="login-card">

<h1>Quelou ERP</h1>
<p style="margin-bottom:25px;">AI Accounting System</p>

<input type="text" id="loginUsername" class="login-input" placeholder="Username">

<input type="password" id="loginPassword" class="login-input" placeholder="Password">

<button class="login-btn" onclick="loginSystem()">
LOGIN SYSTEM
</button>

<br><br>

manager / manager123

user1 / user123

</div>

</div>

</div>

`;

}

function loginSystem(){

let username = document.getElementById("loginUsername").value.trim();
let password = document.getElementById("loginPassword").value.trim();

let users = loadData("systemUsers");

let user = users.find(u =>
u.username === username &&
u.password === btoa(password) &&
u.status === "Active"
);

if(!user){
    alert("Invalid Login");
    return;
}

sessionStorage.setItem("loggedInUser",JSON.stringify(user));

saveAudit("User Login",username);

location.reload();

}

function logoutSystem(){

if(confirm("Logout Account?")){

let user = getCurrentUser();

saveAudit("User Logout",user.username);

sessionStorage.removeItem("loggedInUser");

location.reload();

}

}

function getCurrentUser(){
    return JSON.parse(sessionStorage.getItem("loggedInUser"));
}

if(!sessionStorage.getItem("loggedInUser")){
    renderLogin();
}else{
    renderApp();
}

/* ERP APP */
/* ========================= */

/* ========================= */
/* POPUPS */
/* ========================= */

return `

/* ========================= */
/* DATA */
/* ========================= */

let invoices = loadData("invoices");
let receipts = loadData("receipts");
let expenses = loadData("expenses");
let journalEntries = loadData("journalEntries");
let auditTrail = loadData("auditTrail");

/* ========================= */
/* UTILITIES */
/* ========================= */

function openPopup(id){
    document.getElementById(id).style.display="flex";
}

function closePopup(id){
    document.getElementById(id).style.display="none";
}

window.onclick = function(e){

document.querySelectorAll(".popup").forEach(p=>{
    if(e.target === p){
        p.style.display = "none";
    }
});

}

/* ========================= */
/* AUDIT */
/* ========================= */

function saveAudit(action,reference){

let user = getCurrentUser();

auditTrail.push({
user:user.username,
action,
reference,
date:new Date().toISOString()
});

saveData("auditTrail",auditTrail);

}

/* ========================= */
/* INVOICE */
/* ========================= */

function saveInvoice(){

let number = document.getElementById("invNumber").value || "INV-"+Date.now();

let customer = document.getElementById("invCustomer").value.trim();

let amount = Number(document.getElementById("invAmount").value);

if(!customer){
    alert("Customer Required");
    return;
}

if(amount <= 0){
    alert("Invalid Amount");
    return;
}

let vatable = amount / 1.12;
let vat = amount - vatable;

let ewtRate = Number(document.getElementById("ewtPercent").value);
let ewtAmount = vatable * ewtRate;

let invoice = {

number,
customer,
tin:document.getElementById("invTIN").value,
amount,
vat,
vatable,
ewt:ewtAmount,
status:document.getElementById("invStatus").value,
remarks:document.getElementById("invRemarks").value,
date:new Date().toISOString()

};

invoices.push(invoice);

saveData("invoices",invoices);

journalEntries.push({

ref:number,
type:"Sales Invoice",
date:new Date().toISOString(),

entries:[

{
account:"Accounts Receivable",
debit:amount-ewtAmount,
credit:0
},

{
account:"Creditable Withholding Tax",
debit:ewtAmount,
credit:0
},

{
account:"Sales Revenue",
debit:0,
credit:vatable
},

{
account:"Output VAT",
debit:0,
credit:vat
}

]

});

saveData("journalEntries",journalEntries);

saveAudit("Created Invoice",number);

closePopup("invoicePopup");

renderInvoices();

updateCards();

}

/* ========================= */
/* RECEIPTS */
/* ========================= */

function loadInvoiceOptions(){

let select = document.getElementById("receiptInvoice");

select.innerHTML = "";

invoices
.filter(i=>i.status==="Pending")
.forEach(i=>{

select.innerHTML += `
<option value="${i.number}">
${i.number} - ${sanitize(i.customer)}
</option>
`;

});

}

function saveReceipt(){

let invoiceNo = document.getElementById("receiptInvoice").value;

let amount = Number(document.getElementById("receiptAmount").value);

if(amount <= 0){
    alert("Invalid Amount");
    return;
}

let invoice = invoices.find(i=>i.number===invoiceNo);

if(!invoice){
    alert("Invoice Not Found");
    return;
}

invoice.status = "Paid";

let receipt = {

invoice:invoiceNo,
customer:invoice.customer,
amount,
remarks:document.getElementById("receiptRemarks").value,
date:new Date().toISOString()

};

receipts.push(receipt);

saveData("receipts",receipts);

saveData("invoices",invoices);

journalEntries.push({

ref:"OR-"+Date.now(),
type:"Official Receipt",
date:new Date().toISOString(),

entries:[

{
account:"Cash",
debit:amount,
credit:0
},

{
account:"Accounts Receivable",
debit:0,
credit:amount
}

]

});

saveData("journalEntries",journalEntries);

saveAudit("Created Receipt",invoiceNo);

closePopup("receiptPopup");

renderInvoices();

updateCards();

}

/* ========================= */
/* EXPENSE */
/* ========================= */

function saveExpense(){

let title = document.getElementById("expenseTitle").value.trim();

let amount = Number(document.getElementById("expenseAmount").value);

if(!title){
    alert("Expense Title Required");
    return;
}

if(amount <= 0){
    alert("Invalid Amount");
    return;
}

let vat = amount / 1.12 * 0.12;
let net = amount - vat;

let expense = {

title,
amount,
remarks:document.getElementById("expenseRemarks").value,
date:new Date().toISOString()

};

expenses.push(expense);

saveData("expenses",expenses);

journalEntries.push({

ref:"EXP-"+Date.now(),
type:"Expense",
date:new Date().toISOString(),

entries:[

{
account:"Expense",
debit:net,
credit:0
},

{
account:"Input VAT",
debit:vat,
credit:0
},

{
account:"Cash",
debit:0,
credit:amount
}

]

});

saveData("journalEntries",journalEntries);

saveAudit("Created Expense",title);

closePopup("expensePopup");

updateCards();

}

/* ========================= */
/* RENDER INVOICES */
/* ========================= */

function renderInvoices(){

let table = document.getElementById("transactionTable");

table.innerHTML = `

<tr>

<th>Invoice</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

`;

invoices.forEach((inv,index)=>{

let statusClass =
inv.status === "Paid"
? "status-paid"
: "status-pending";

table.innerHTML += `

<tr>

<td>${sanitize(inv.number)}</td>

<td>${sanitize(inv.customer)}</td>

<td>
₱${Number(inv.amount).toLocaleString()}
</td>

<td>
<span class="${statusClass}">
${sanitize(inv.status)}
</span>
</td>

<td>
${new Date(inv.date).toLocaleString()}
</td>

<td>

<button onclick="viewInvoice(${index})">
👁️
</button>

<button class="danger-btn" onclick="deleteInvoice(${index})">
Delete
</button>

</td>

</tr>

`;

});

}

/* ========================= */
/* VIEW INVOICE */
/* ========================= */

function viewInvoice(index){

<h1>Sales Invoice</h1>

<br>

<b>Invoice:</b> ${sanitize(inv.number)}<br>
<b>Customer:</b> ${sanitize(inv.customer)}<br>

<br>

<table>

<tr>
<th>Description</th>
<th>Amount</th>
</tr>

<tr>
<td>ERP Services</td>
<td>₱${Number(inv.amount).toLocaleString()}</td>
</tr>

</table>

<br>

<b>Vatable:</b>
₱${Number(inv.vatable).toLocaleString()}

<br><br>

₱${Number(inv.vat).toLocaleString()}

/* ========================= */
/* DELETE */
/* ========================= */

function deleteInvoice(index){

let user = getCurrentUser();

if(
user.role !== "Super Admin" &&
user.role !== "Manager"
){
    alert("Access Denied");
    return;
}

if(confirm("Delete Invoice?")){

let ref = invoices[index].number;

saveAudit("Deleted Invoice",ref);

invoices.splice(index,1);

journalEntries = journalEntries.filter(
j=>j.ref !== ref
);

saveData("invoices",invoices);

saveData("journalEntries",journalEntries);

renderInvoices();

updateCards();

}

}

/* ========================= */
/* DASHBOARD */
/* ========================= */

function updateCards(){

let sales = invoices.reduce(
(a,b)=>a+Number(b.amount),0
);

let collections = receipts.reduce(
(a,b)=>a+Number(b.amount),0
);

let expenseTotal = expenses.reduce(
(a,b)=>a+Number(b.amount),0
);

let receivables = invoices
.filter(i=>i.status==="Pending")
.reduce((a,b)=>a+Number(b.amount),0);

let profit = collections - expenseTotal;

document.getElementById("totalSales").innerHTML =
"₱"+sales.toLocaleString();

document.getElementById("totalCollection").innerHTML =
"₱"+collections.toLocaleString();

document.getElementById("receivables").innerHTML =
"₱"+receivables.toLocaleString();

document.getElementById("netProfit").innerHTML =
"₱"+profit.toLocaleString();

}

/* ========================= */
/* GENERAL LEDGER */
/* ========================= */

function generateGL(){

let html = `<h2>General Ledger</h2><br>`;

journalEntries.forEach(j=>{

html += `

<div style="padding:20px;background:#f8fafc;border-radius:20px;margin-bottom:15px;">

<b>Reference:</b> ${sanitize(j.ref)}<br>
<b>Type:</b> ${sanitize(j.type)}<br>
<b>Date:</b> ${new Date(j.date).toLocaleString()}<br>

<br>

`;

j.entries.forEach(e=>{

html += `
${sanitize(e.account)}
| Debit ₱${Number(e.debit).toLocaleString()}
| Credit ₱${Number(e.credit).toLocaleString()}
<br>
`;

});

html += `</div>`;

});

document.getElementById("reportContent").innerHTML = html;

openPopup("reportPopup");

}

/* ========================= */
/* TRIAL BALANCE */
/* ========================= */

function generateTrialBalance(){

let accounts = {};

journalEntries.forEach(j=>{

j.entries.forEach(e=>{

if(!accounts[e.account]){

accounts[e.account] = {
debit:0,
credit:0
};

}

accounts[e.account].debit += Number(e.debit);
accounts[e.account].credit += Number(e.credit);

});

});

let html = `

<h2>Trial Balance</h2>

<br>

<table>

<tr>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
</tr>

`;

Object.keys(accounts).forEach(acc=>{

html += `

<tr>

<td>${sanitize(acc)}</td>

<td>
₱${accounts[acc].debit.toLocaleString()}
</td>

<td>
₱${accounts[acc].credit.toLocaleString()}
</td>

</tr>

`;

});

html += `</table>`;

document.getElementById("reportContent").innerHTML = html;

openPopup("reportPopup");

}

/* ========================= */
/* FINANCIAL REPORT */
/* ========================= */

function generateFinancialSummary(){

let sales = invoices.reduce(
(a,b)=>a+Number(b.amount),0
);

let expenseTotal = expenses.reduce(
(a,b)=>a+Number(b.amount),0
);

let profit = sales - expenseTotal;

let margin = sales > 0
? ((profit/sales)*100).toFixed(2)
: 0;

let html = `

<h2>Financial Summary</h2>

<br>

<b>Total Revenue:</b>
₱${sales.toLocaleString()}

<br><br>

<b>Total Expenses:</b>
₱${expenseTotal.toLocaleString()}

<br><br>

<b>Net Profit:</b>
₱${profit.toLocaleString()}

<br><br>

<b>Profit Margin:</b>
${margin}%

`;

document.getElementById("reportContent").innerHTML = html;

openPopup("reportPopup");

}

function downloadBackup(){

let backup = {

invoices,
receipts,
expenses,
journalEntries,
auditTrail,
users:loadData("systemUsers")

};

let blob = new Blob(
[JSON.stringify(backup,null,2)],
{type:"application/json"}
);

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "QuelouERPBackup.json";

a.click();

saveAudit("Downloaded Backup","System Backup");

}
