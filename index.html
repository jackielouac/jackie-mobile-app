<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quelou Accounting System</title>

<style>

:root{
--blue:#0a84ff;
--green:#30d158;
--orange:#ff9f0a;
--red:#ff453a;
--bg:#f5f7fb;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:300px;
background:white;
padding:25px;
border-right:1px solid #ddd;
overflow:auto;
}

.main{
flex:1;
padding:25px;
padding-top:90px;
}

.topbar{
position:fixed;
top:0;
left:300px;
right:0;
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
border-bottom:1px solid #ddd;
z-index:999;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.menu button{
padding:15px;
border:none;
border-radius:14px;
background:#f3f4f6;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:var(--blue);
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
margin-bottom:10px;
color:gray;
}

.value{
font-size:28px;
font-weight:bold;
}

.table-box{
background:white;
padding:25px;
border-radius:24px;
margin-bottom:25px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
text-align:left;
}

.primary-btn,
.success-btn,
.danger-btn{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.primary-btn{
background:var(--blue);
color:white;
}

.success-btn{
background:var(--green);
color:white;
}

.danger-btn{
background:var(--red);
color:white;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
background:white;
padding:30px;
border-radius:28px;
width:100%;
max-width:1000px;
max-height:90vh;
overflow:auto;
}

.popup-box input,
.popup-box select,
.popup-box textarea{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.login-wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
width:100%;
max-width:420px;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.login-input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
font-weight:bold;
cursor:pointer;
}

.status-paid{
background:#d1fadf;
color:#027a48;
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.status-pending{
background:#fef0c7;
color:#b54708;
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

function loadData(key){
return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
localStorage.setItem(key,JSON.stringify(data));
}

function sanitize(str){
return String(str)
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

const users=[
{
username:"jackie@quelou.com.ph",
password:btoa("admin123"),
role:"Super Admin"
}
];

if(!localStorage.getItem("systemUsers")){
saveData("systemUsers",users);
}

let invoices=loadData("invoices");
let ledger=loadData("ledger");
let customers=loadData("customers");
let vendors=loadData("vendors");
let employees=loadData("employees");
let purchaseRequests=loadData("purchaseRequests");
let purchaseOrders=loadData("purchaseOrders");
let disbursements=loadData("disbursements");

function renderLogin(){

document.getElementById("app").innerHTML=`

<div class="login-wrapper">

<div class="login-card">

<h1 style="color:#0a84ff;">Quelou ERP</h1>

<br>

<input type="text" id="username" class="login-input" placeholder="Username">

<input type="password" id="password" class="login-input" placeholder="Password">

<button class="login-btn" onclick="login()">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=loadData("systemUsers");

let user=users.find(u=>
u.username===username &&
u.password===btoa(password)
);

if(!user){
alert("Invalid Login");
return;
}

sessionStorage.setItem("user",JSON.stringify(user));

location.reload();

}

function logout(){
sessionStorage.removeItem("user");
location.reload();
}

if(!sessionStorage.getItem("user")){
renderLogin();
}else{
renderApp();
}

function renderApp(){

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<h2 style="color:#0a84ff;">Quelou ERP</h2>

<p>Philippine AI Accounting System</p>

<div class="menu">

<button onclick="openInvoicePopup()">
➕ Create Invoice
</button>

<button onclick="openPRPopup()">
🛒 Purchase Request
</button>

<button onclick="backupSystem()">
⬇️ Backup
</button>

<button onclick="restoreSystem()">
♻️ Restore
</button>

<button onclick="financialReports()">
📑 Financial Reports
</button>

<button onclick="maintenanceModule()">
⚙️ Maintenance
</button>

<button onclick="runAIQuery()">
🤖 AI Query
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<div class="main">

<h1>Accounting Dashboard</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value">
₱${invoices.reduce((a,b)=>a+b.total,0).toLocaleString()}
</div>
</div>

<div class="card">
<h3>Total Invoices</h3>
<div class="value">
${invoices.length}
</div>
</div>

<div class="card">
<h3>Pending Collection</h3>
<div class="value">
${invoices.filter(i=>i.status!=="Paid").length}
</div>
</div>

<div class="card">
<h3>Collected</h3>
<div class="value">
${invoices.filter(i=>i.status==="Paid").length}
</div>
</div>

</div>

<div class="table-box">

<h2>Billing & Collection</h2>

<br>

<table id="invoiceTable"></table>

</div>

<div class="table-box">

<h2>General Ledger</h2>

<br>

<table id="ledgerTable"></table>

</div>

</div>

</div>

<div class="topbar">

<h3>Quelou ERP AI Accounting PRO</h3>

<input type="text"
id="aiQuery"
placeholder="Ask accounting AI..."
style="
padding:12px;
border:none;
border-radius:12px;
width:300px;
background:#f3f4f6;
">

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h2>Create Invoice</h2>

<br>

<input type="text" id="customer" placeholder="Customer Name">

<input type="text" id="tin" placeholder="TIN">

<input type="text" id="address" placeholder="Address">

<input type="number" id="amount" placeholder="Amount">

<select id="status">

<option value="Pending">
Pending
</option>

<option value="Paid">
Paid
</option>

</select>

<select id="documentType">

<option>EIS</option>
<option>EOPT</option>
<option>EOR</option>
<option>BIR CAS</option>

</select>

<textarea id="remarks" placeholder="Remarks"></textarea>

<button class="primary-btn" onclick="saveInvoice()">
Save Invoice
</button>

<button class="danger-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

`;

renderInvoices();
renderLedger();

}

function openInvoicePopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function saveInvoice(){

let customer=document.getElementById("customer").value;
let tin=document.getElementById("tin").value;
let address=document.getElementById("address").value;
let amount=Number(document.getElementById("amount").value);
let status=document.getElementById("status").value;
let remarks=document.getElementById("remarks").value;
let documentType=document.getElementById("documentType").value;

let vat=12;
let vatAmount=(amount*vat)/100;
let total=amount+vatAmount;

let invoice={

invoice:"INV-"+Date.now(),
customer,
tin,
address,
amount,
vat,
vatAmount,
total,
status,
remarks,
documentType,
date:new Date().toLocaleString()

};

invoices.push(invoice);

ledger.push({

date:new Date().toLocaleString(),
reference:invoice.invoice,
debit:status==="Paid"
? "Cash"
: "Accounts Receivable",
credit:"Sales Revenue",
amount:total,
remarks:customer

});

saveData("invoices",invoices);
saveData("ledger",ledger);

alert("Invoice Saved");

location.reload();

}

function renderInvoices(){

let table=document.getElementById("invoiceTable");

table.innerHTML=`

<tr>

<th>Invoice</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>

</tr>

`;

invoices.forEach(inv=>{

table.innerHTML+=`

<tr>

<td>${sanitize(inv.invoice)}</td>

<td>${sanitize(inv.customer)}</td>

<td>
₱${Number(inv.total).toLocaleString()}
</td>

<td>

<span class="${
inv.status==="Paid"
? "status-paid"
: "status-pending"
}">

${sanitize(inv.status)}

</span>

</td>

<td>

${
inv.status==="Paid"
? "Collected"

: `

<button
class="success-btn"
onclick="collectPayment('${inv.invoice}')">

Collect

</button>

`

}

</td>

</tr>

`;

});

}

function collectPayment(invoiceNo){

let inv=invoices.find(i=>i.invoice===invoiceNo);

if(!inv) return;

if(inv.status==="Paid"){
alert("Already Collected");
return;
}

inv.status="Paid";

ledger.push({

date:new Date().toLocaleString(),
reference:invoiceNo,
debit:"Cash",
credit:"Accounts Receivable",
amount:inv.total,
remarks:"Collection"

});

saveData("invoices",invoices);
saveData("ledger",ledger);

printCollectionReceipt(inv);

location.reload();

}

function printCollectionReceipt(inv){

let win=window.open();

win.document.write(`

<html>

<head>

<title>Collection Receipt</title>

<style>

body{
font-family:Arial;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>

<h1>OFFICIAL RECEIPT</h1>

<hr>

<p><b>Receipt No:</b> OR-${Date.now()}</p>

<p><b>Invoice Ref:</b> ${inv.invoice}</p>

<p><b>Customer:</b> ${inv.customer}</p>

<p><b>Date:</b> ${new Date().toLocaleString()}</p>

<table>

<tr>
<td>Total Collection</td>
<td>₱${inv.total.toLocaleString()}</td>
</tr>

</table>

<br>

<h3>Accounting Entry</h3>

<p>Debit: Cash</p>

<p>Credit: Accounts Receivable</p>

</body>

</html>

`);

}

function renderLedger(){

let table=document.getElementById("ledgerTable");

table.innerHTML=`

<tr>

<th>Date</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Amount</th>

</tr>

`;

ledger.forEach(item=>{

table.innerHTML+=`

<tr>

<td>${sanitize(item.date)}</td>

<td>${sanitize(item.reference)}</td>

<td>${sanitize(item.debit)}</td>

<td>${sanitize(item.credit)}</td>

<td>
₱${Number(item.amount).toLocaleString()}
</td>

</tr>

`;

});

}

function backupSystem(){

let backup={

invoices,
ledger,
customers,
vendors,
employees,
purchaseRequests,
purchaseOrders,
disbursements

};

let blob=new Blob(
[JSON.stringify(backup,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="QuelouERPBackup.json";

a.click();

}

function restoreSystem(){

let input=document.createElement("input");

input.type="file";

input.onchange=e=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let data=JSON.parse(evt.target.result);

saveData("invoices",data.invoices||[]);
saveData("ledger",data.ledger||[]);
saveData("customers",data.customers||[]);
saveData("vendors",data.vendors||[]);
saveData("employees",data.employees||[]);
saveData("purchaseRequests",data.purchaseRequests||[]);
saveData("purchaseOrders",data.purchaseOrders||[]);
saveData("disbursements",data.disbursements||[]);

alert("Restore Complete");

location.reload();

};

reader.readAsText(file);

};

input.click();

}

function financialReports(){

let win=window.open();

let sales=invoices.reduce((a,b)=>a+b.total,0);

win.document.write(`

<html>

<head>

<title>Financial Reports</title>

<style>

body{
font-family:Arial;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:30px;
}

td,th{
border:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>

<h1>FINANCIAL REPORTS</h1>

<h2>Income Statement</h2>

<table>

<tr>

<th>Description</th>
<th>Amount</th>

</tr>

<tr>

<td>Sales Revenue</td>

<td>
₱${sales.toLocaleString()}
</td>

</tr>

</table>

<h2>General Ledger</h2>

<table>

<tr>

<th>Date</th>
<th>Reference</th>
<th>Debit</th>

</tr>

${ledger.map(l=>`

<tr>

₱${Number(l.amount).toLocaleString()}
</td>

</html>

`);

}

function maintenanceModule(){

alert(
"Maintenance Module:\n\n"+
"- Customer Master\n"+
"- Vendor Master\n"+
"- Employee Master\n"+
"- Chart of Accounts\n"+
"- Tax Setup\n"+
"- ATC Setup\n"+
"- EWT Setup\n"+
"- User Setup"
);

}

function openPRPopup(){

alert(
"Purchase Request Module\n\n"+
"PR → PO → Receiving → AP → CV → Check → 2307"
);

}

function runAIQuery(){

let q=document.getElementById("aiQuery")
.value
.toLowerCase();

if(q.includes("sales")){

alert(
"Total Sales: ₱"+
invoices.reduce((a,b)=>a+b.total,0)
.toLocaleString()
);

}

else if(q.includes("pending")){

alert(
"Pending Collection: "+
invoices.filter(i=>i.status!=="Paid").length
);

}

else if(q.includes("cash")){

alert(
"Cash Collected: ₱"+
invoices
.filter(i=>i.status==="Paid")
.reduce((a,b)=>a+b.total,0)
.toLocaleString()
);

}

else{

alert("AI Query Not Recognized");

}

}

</script>

</body>
</html>
