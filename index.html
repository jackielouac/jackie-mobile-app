<!-- ================= AI CHAT ASSISTANT ENHANCEMENT ================= -->
<!-- ADD THIS RIGHT BEFORE </body> -->

<!-- TRY ME BUTTON -->

<button id="openChat"
class="fixed bottom-6 right-6 z-[9999] bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-full shadow-[0_0_30px_rgba(59,130,246,.5)] font-bold transition hover:scale-105">

🤖 Try Me

</button>

<!-- CHATBOX -->

<div id="chatBox"
class="fixed bottom-24 right-6 w-[380px] h-[600px] glass rounded-[35px] overflow-hidden hidden flex-col z-[9999] border border-white/10 shadow-[0_0_40px_rgba(59,130,246,.3)]">

<!-- HEADER -->

<div class="bg-gradient-to-r from-blue-600 to-purple-600 p-5 flex justify-between items-center">

<div>
<h2 class="font-bold text-xl">AI Assistant</h2>
<p class="text-sm text-white/80">Ask me anything ✨</p>
</div>

<button id="closeChat"
class="text-white text-2xl hover:scale-110 transition">

&times;

</button>

</div>

<!-- CHAT AREA -->

<div id="chatMessages"
class="flex-1 overflow-y-auto p-5 space-y-4 bg-[#0b1023]">

<!-- BOT MESSAGE -->

<div class="flex">

<div class="bg-blue-600 text-white p-4 rounded-2xl rounded-bl-none max-w-[85%]">

👋 Hello! I'm Jackielou's AI Assistant.  
Ask me anything about services, skills, business support, marketing, CRM, or general questions.

</div>

</div>

</div>

<!-- INPUT -->

<div class="p-4 border-t border-white/10 bg-[#0f172a]">

<div class="flex gap-3">

<input
type="text"
id="userInput"
placeholder="Type your message..."
class="flex-1 bg-white/10 border border-white/10 rounded-2xl px-4 py-3 outline-none text-white placeholder-gray-400"
/>

<button id="sendBtn"
class="bg-blue-600 hover:bg-blue-700 px-5 rounded-2xl font-bold transition">

➤

</button>

</div>

</div>

</div>

<!-- ================= AI CHAT SCRIPT ================= -->

<script>

/* OPEN/CLOSE CHAT */

const openChat = document.getElementById("openChat");
const closeChat = document.getElementById("closeChat");
const chatBox = document.getElementById("chatBox");

openChat.onclick = () => {
chatBox.classList.remove("hidden");
chatBox.classList.add("flex");
}

closeChat.onclick = () => {
chatBox.classList.add("hidden");
chatBox.classList.remove("flex");
}

/* CHAT SYSTEM */

const sendBtn = document.getElementById("sendBtn");
const userInput = document.getElementById("userInput");
const chatMessages = document.getElementById("chatMessages");

/* ADD MESSAGE FUNCTION */

function addMessage(message, sender){

const wrapper = document.createElement("div");

wrapper.className = sender === "user"
? "flex justify-end"
: "flex";

const bubble = document.createElement("div");

bubble.className = sender === "user"
? "bg-white text-black p-4 rounded-2xl rounded-br-none max-w-[85%]"
: "bg-blue-600 text-white p-4 rounded-2xl rounded-bl-none max-w-[85%]";

bubble.innerHTML = message;

wrapper.appendChild(bubble);

chatMessages.appendChild(wrapper);

chatMessages.scrollTop = chatMessages.scrollHeight;

}

/* AI RESPONSE */

async function generateAIResponse(userText){

/* SIMPLE LOADING */

addMessage("⏳ Thinking...", "bot");

/* REMOVE LOADING AFTER RESPONSE */

const loadingBubble = chatMessages.lastChild;

try{

/* OPENAI API */

const response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",

/* IMPORTANT */
/* REPLACE WITH YOUR OPENAI API KEY */

"Authorization":"Bearer YOUR_OPENAI_API_KEY"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[

{
role:"system",
content:`
You are a smart AI assistant for Jackielou Cadlum's portfolio website.

You help visitors learn about:
- Sales & Marketing
- CRM Support
- Appointment Setting
- Lead Generation
- Business Support
- Digital Marketing
- Customer Service

Be professional, friendly, modern, and helpful.
`
},

{
role:"user",
content:userText
}

],

temperature:0.8

})

});

const data = await response.json();

loadingBubble.remove();

const reply =
data.choices?.[0]?.message?.content ||
"Sorry, I couldn't process that.";

addMessage(reply, "bot");

}catch(error){

loadingBubble.remove();

addMessage("⚠️ Error connecting to AI service.", "bot");

console.error(error);

}

}

/* SEND MESSAGE */

function sendMessage(){

const text = userInput.value.trim();

if(!text) return;

addMessage(text, "user");

userInput.value = "";

generateAIResponse(text);

}

/* BUTTON CLICK */

sendBtn.addEventListener("click",sendMessage);

/* ENTER KEY */

userInput.addEventListener("keypress",(e)=>{

if(e.key === "Enter"){
sendMessage();
}

});

</script>
