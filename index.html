<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelou ERP AI Accounting</title>

<style>

:root{
--blue:#0a84ff;
--green:#30d158;
--orange:#ff9f0a;
--red:#ff453a;
--bg:#f5f7fb;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:270px;
background:#fff;
padding:25px;
border-right:1px solid var(--line);
}

.logo{
margin-bottom:25px;
}

.logo h2{
color:var(--blue);
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
padding:15px;
border:none;
border-radius:16px;
background:#f3f4f6;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.menu button:hover{
background:var(--blue);
color:#fff;
}

.main{
flex:1;
padding:25px;
padding-top:90px;
}

.topbar{
position:fixed;
top:0;
left:270px;
right:0;
height:70px;
background:#fff;
border-bottom:1px solid var(--line);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
z-index:999;
}

.logout-btn{
padding:12px 18px;
border:none;
border-radius:12px;
background:var(--red);
color:white;
cursor:pointer;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
margin-bottom:10px;
color:gray;
}

.value{
font-size:30px;
font-weight:bold;
}

.blue{color:var(--blue);}
.green{color:var(--green);}
.orange{color:var(--orange);}
.red{color:var(--red);}

.table-box{
background:#fff;
padding:25px;
border-radius:24px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
width:100%;
max-width:800px;
background:#fff;
padding:30px;
border-radius:28px;
max-height:90vh;
overflow:auto;
}

.popup-box input,
.popup-box textarea,
.popup-box select{
width:100%;
padding:15px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.primary-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:var(--blue);
color:#fff;
cursor:pointer;
font-weight:bold;
}

.secondary-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.success-btn{
padding:14px 18px;
border:none;
border-radius:14px;
background:var(--green);
color:white;
cursor:pointer;
font-weight:bold;
}

.status-paid{
background:rgba(48,209,88,.15);
color:var(--green);
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.status-pending{
background:rgba(255,159,10,.15);
color:var(--orange);
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.login-wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:420px;
background:#fff;
padding:40px;
border-radius:35px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.login-input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:16px;
background:#f3f4f6;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:var(--blue);
color:#fff;
font-weight:bold;
cursor:pointer;
}

@media(max-width:768px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

.topbar{
left:0;
}

.main{
padding-top:110px;
}

}

</style>
</head>

<body>

<div id="app"></div>

<script>

function loadData(key){
return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
localStorage.setItem(key,JSON.stringify(data));
}

function sanitize(str){
return String(str)
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

const users = [
{
username:"admin",
password:btoa("admin123"),
role:"Super Admin"
}
];

if(!localStorage.getItem("systemUsers")){
saveData("systemUsers",users);
}

function renderLogin(){

document.getElementById("app").innerHTML = `

<div class="login-wrapper">

<div class="login-card">

<h1 style="color:#0a84ff;">Quelou ERP</h1>

<p style="margin:15px 0 25px;">
AI Accounting System
</p>

<input type="text" id="username" class="login-input" placeholder="Username">

<input type="password" id="password" class="login-input" placeholder="Password">

<button class="login-btn" onclick="login()">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=loadData("systemUsers");

let user=users.find(u=>
u.username===username &&
u.password===btoa(password)
);

if(!user){
alert("Invalid Login");
return;
}

sessionStorage.setItem("user",JSON.stringify(user));

location.reload();

}

function logout(){
sessionStorage.removeItem("user");
location.reload();
}

if(!sessionStorage.getItem("user")){
renderLogin();
}else{
renderApp();
}

let invoices=loadData("invoices");

function renderApp(){

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<div class="logo">
<h2>Quelou ERP</h2>
<p>Accounting Dashboard</p>
</div>

<div class="menu">

<button onclick="openPopup()">
➕ New Invoice
</button>

<button onclick="exportJSON()">
💾 Export JSON
</button>

<button onclick="window.print()">
🖨️ Print Report
</button>

<button onclick="downloadBackup()">
⬇️ Download Backup
</button>

<button onclick="saveAccountingSystem()">
📚 Save to Accounting System
</button>

</div>

</div>

<div class="main">

<h1>Dashboard</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value blue" id="sales">₱0</div>
</div>

<div class="card">
<h3>Invoices</h3>
<div class="value green" id="invoiceCount">0</div>
</div>

<div class="card">
<h3>Pending</h3>
<div class="value orange" id="pendingCount">0</div>
</div>

<div class="card">
<h3>Paid</h3>
<div class="value red" id="paidCount">0</div>
</div>

</div>

<div class="table-box">

<h2>Transactions</h2>

<br>

<table id="table"></table>

</div>

</div>

</div>

<div class="topbar">

<h3>Quelou ERP AI Accounting</h3>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h2>Create Invoice</h2>

<br>

<input type="text" id="customer" placeholder="Customer Name">

<input type="number" id="amount" placeholder="Amount">

<select id="status">

<option value="Pending">Pending</option>
<option value="Paid">Paid</option>

</select>

<textarea id="remarks" placeholder="Remarks"></textarea>

<button class="primary-btn" onclick="saveInvoice()">
Save Invoice
</button>

<button class="secondary-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

`;

renderInvoices();
updateDashboard();

}

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function saveInvoice(){

let customer=document.getElementById("customer").value;
let amount=Number(document.getElementById("amount").value);
let status=document.getElementById("status").value;
let remarks=document.getElementById("remarks").value;

if(!customer || amount<=0){
alert("Complete fields");
return;
}

invoices.push({
invoice:"INV-"+Date.now(),
customer,
amount,
status,
remarks,
date:new Date().toLocaleString()
});

saveData("invoices",invoices);

closePopup();

renderInvoices();
updateDashboard();

}

function renderInvoices(){

let table=document.getElementById("table");

table.innerHTML=`

<tr>
<th>Invoice</th>
<th>Customer</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
</tr>

`;

invoices.forEach(inv=>{

table.innerHTML+=`

<tr>

<td>${sanitize(inv.invoice)}</td>

<td>${sanitize(inv.customer)}</td>

<td>₱${Number(inv.amount).toLocaleString()}</td>

<td>
<span class="${
inv.status==="Paid"
? "status-paid"
: "status-pending"
}">
${sanitize(inv.status)}
</span>
</td>

<td>${sanitize(inv.date)}</td>

</tr>

`;

});

}

function updateDashboard(){

let sales=invoices.reduce((a,b)=>a+b.amount,0);

let paid=invoices.filter(i=>i.status==="Paid").length;

let pending=invoices.filter(i=>i.status==="Pending").length;

document.getElementById("sales").innerHTML=
"₱"+sales.toLocaleString();

document.getElementById("invoiceCount").innerHTML=
invoices.length;

document.getElementById("pendingCount").innerHTML=
pending;

document.getElementById("paidCount").innerHTML=
paid;

}

function exportJSON(){

let blob=new Blob(
[JSON.stringify(invoices,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="invoices.json";

a.click();

}

function downloadBackup(){

let backup={
invoices
};

let blob=new Blob(
[JSON.stringify(backup,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="QuelouERPBackup.json";

a.click();

}

function saveAccountingSystem(){

alert(
"Accounting records successfully saved."
);

}

</script>

</body>
</html>
